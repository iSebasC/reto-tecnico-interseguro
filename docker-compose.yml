version: '3.9'

services:
  api-node:
    build: ./api-node
    container_name: interseguro-api-node
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: "production"
    networks:
      - app-network
    restart: unless-stopped

  api-go:
    build: ./api-go
    container_name: interseguro-api-go
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      NODE_API_URL: "http://api-node:3000"
    networks:
      - app-network
    depends_on:
      - api-node
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
